services:
  db:
    image: postgres:16-alpine
    container_name: mornut_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mornut
      POSTGRES_PASSWORD: mornut
      POSTGRES_DB: mornut
    ports:
      # Host 5433 is taken by a locally-installed PostgreSQL on this machine,
      # so map to 5455 instead. Update DATABASE_URL in backend/.env to match.
      - "5455:5432"
    volumes:
      - mornut_pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mornut_pgdata:
